services:
  seq:
    image: datalust/seq:latest
    ports:
      - "4201:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    volumes:
      - seq-data:/data

  portal:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "4200:4200"
    volumes:
      - ./config.docker.json:/app/config.json:ro
    environment:
      - RUST_LOG=info
      - TMF_CONFIG_PATH=/app/config.json
      - STATIC_DIR=/app/static
      - SEQ_URL=http://seq:80
    depends_on:
      - seq

volumes:
  seq-data:
