services:
  seq:
    image: datalust/seq:latest
    ports:
      - "4202:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    volumes:
      - seq-data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "4201:4201"
    environment:
      - RUST_LOG=info
      - TMF_CONFIG_PATH=/app/config.json
      - SEQ_URL=http://seq:80
    depends_on:
      - seq

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "4200:3000"
    environment:
      - API_URL=http://localhost:4201
    depends_on:
      - backend

volumes:
  seq-data:
